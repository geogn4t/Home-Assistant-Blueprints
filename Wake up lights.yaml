blueprint:
  name: Wake-up Light Ramp (weekday/weekend helpers, optional off time)
  description: >
    Sunrise-style wake-up lights using weekday/weekend input_datetime helpers.
    Fixed color temperature (Kelvin), smooth quadratic ease-in transition,
    optional "turn off at time". Stops ramp if the light is turned off manually
    or if the enabled toggle is turned off mid-run.
  domain: automation

  input:
    light_entity:
      name: Light (single light entity)
      selector:
        entity:
          domain: light

    weekday_time:
      name: Weekday wake time (input_datetime)
      selector:
        entity:
          domain: input_datetime

    weekend_time:
      name: Weekend wake time (input_datetime)
      selector:
        entity:
          domain: input_datetime

    enabled_boolean:
      name: Enabled toggle (input_boolean)
      selector:
        entity:
          domain: input_boolean

    ramp_minutes:
      name: Ramp duration (minutes)
      default: 45
      selector:
        number:
          min: 5
          max: 120
          step: 1
          mode: slider

    start_brightness:
      name: Start brightness (1-255)
      default: 10
      selector:
        number:
          min: 1
          max: 255
          step: 1
          mode: slider

    end_brightness:
      name: End brightness (1-255)
      default: 250
      selector:
        number:
          min: 1
          max: 255
          step: 1
          mode: slider

    color_temp_kelvin:
      name: Color temperature (Kelvin)
      description: Fixed color temperature during the whole ramp. Warm white is ~2700K, cool white ~5000K.
      default: 2941
      selector:
        number:
          min: 2000
          max: 6500
          step: 1
          mode: slider

    transition_seconds:
      name: Transition seconds (smooth fade per step)
      default: 60
      selector:
        number:
          min: 0
          max: 120
          step: 1
          mode: slider

    turn_off_time:
      name: Turn off at time (optional input_datetime)
      description: If set, after the ramp finishes, wait until this time today and then turn the light off. Leave blank to skip.
      default: ""
      selector:
        entity:
          domain: input_datetime

mode: single

trigger:
  - platform: time_pattern
    hours: "*"
    minutes: "/1"
    seconds: "0"

variables:
  light_entity: !input light_entity
  weekday_time: !input weekday_time
  weekend_time: !input weekend_time
  enabled_boolean: !input enabled_boolean
  turn_off_time: !input turn_off_time

  ramp_mins: !input ramp_minutes
  start_bri: !input start_brightness
  end_bri: !input end_brightness
  ct: !input color_temp_kelvin
  trans_s: !input transition_seconds

  is_weekend: "{{ now().weekday() >= 5 }}"

  chosen_time_entity: "{{ weekend_time if is_weekend else weekday_time }}"

  chosen_hhmm: >-
    {% set h = state_attr(chosen_time_entity, 'hour') | int(0) %}
    {% set m = state_attr(chosen_time_entity, 'minute') | int(0) %}
    {{ "%02d:%02d" | format(h, m) }}

  now_hhmm: "{{ now().strftime('%H:%M') }}"
  off_enabled: "{{ turn_off_time != '' }}"

condition:
  - condition: template
    value_template: "{{ now_hhmm == chosen_hhmm }}"
  - condition: state
    entity_id: !input enabled_boolean
    state: "on"
  - condition: template
    value_template: "{{ states(light_entity) == 'off' }}"

action:
  # Initial turn_on at start brightness and fixed color temp
  - action: light.turn_on
    target:
      entity_id: "{{ light_entity }}"
    data:
      brightness: "{{ start_bri | int }}"
      color_temp_kelvin: "{{ ct | int }}"
      transition: "{{ trans_s | int }}"

  # Ramp loop (quadratic ease-in over ramp_mins steps)
  - repeat:
      count: "{{ ramp_mins | int }}"
      sequence:
        - delay:
            minutes: 1

        # Stop if light was turned off manually
        - choose:
            - conditions:
                - condition: template
                  value_template: "{{ states(light_entity) == 'off' }}"
              sequence:
                - stop: "Light turned off manually; stopping ramp."

        # Stop if enabled toggle was turned off mid-run
        - choose:
            - conditions:
                - condition: state
                  entity_id: !input enabled_boolean
                  state: "off"
              sequence:
                - stop: "Disabled during ramp; stopping."

        - variables:
            p: "{{ repeat.index / (ramp_mins | float) }}"
            e: "{{ p * p }}"
            new_bri: >-
              {% set val = start_bri + (end_bri - start_bri) * e %}
              {{ [val | round(0) | int, end_bri | int] | min }}

        - action: light.turn_on
          target:
            entity_id: "{{ light_entity }}"
          data:
            brightness: "{{ new_bri }}"
            color_temp_kelvin: "{{ ct | int }}"
            transition: "{{ trans_s | int }}"

  # Optional: turn off at a specified time today (only if still in the future)
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ off_enabled }}"
        sequence:
          - variables:
              off_dt: >-
                {% set h = state_attr(turn_off_time, 'hour') | int(0) %}
                {% set m = state_attr(turn_off_time, 'minute') | int(0) %}
                {{ today_at("%02d:%02d" | format(h, m)) }}
          - condition: template
            value_template: "{{ off_dt > now() }}"
          - delay: "{{ (off_dt - now()).total_seconds() | int }}"
          - action: light.turn_off
            target:
              entity_id: "{{ light_entity }}"
            data:
              transition: "{{ trans_s | int }}"
